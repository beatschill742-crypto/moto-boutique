<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moto Boutique Taller de Motos - Admin Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #fafafa; overflow-x: hidden; }
        .font-oswald { font-family: 'Oswald', sans-serif; }
        .glass { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .orange-glow { box-shadow: 0 0 25px rgba(249, 115, 22, 0.15); }
        .orange-glow-strong { box-shadow: 0 0 35px rgba(249, 115, 22, 0.4); }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f97316; }

        .btn-action { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-action:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-action:active { transform: translateY(0); }
        
        .input-dark { background: #18181b; border: 1px solid #27272a; color: white; padding: 12px 16px; border-radius: 12px; outline: none; transition: border 0.2s; }
        .input-dark:focus { border-color: #f97316; }

        /* Estilo para que las tablas sean responsivas en móvil */
        @media (max-width: 768px) {
            .mobile-table-card { display: block; border-bottom: 1px solid #27272a; padding: 1rem 0; }
            .mobile-hide { display: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            Bike: ({size=24, className=""}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="15" cy="5" r="1"/><path d="M12 17.5V14l-3-3 4-3 2 3h2"/></svg>
            ),
            Dashboard: ({size=20}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            ),
            Package: ({size=20}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
            ),
            Users: ({size=20}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            ),
            Plus: ({size=18}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            ),
            Trash: ({size=16}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            ),
            Check: ({size=16}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            ),
            Logout: ({size=18}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            ),
            Chart: ({size=20}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
            )
        };

        const DEFAULT_STOCK = [
            { id: 1, name: 'Casco Bell Qualifier Stealth', category: 'Accesorios', price: 4850, stock: 5, img: 'https://images.unsplash.com/photo-1599819811279-d5ad9cccf838?q=80&w=600' },
            { id: 2, name: 'Kit Arrastre Reforzado DID', category: 'Refacciones', price: 2100, stock: 12, img: 'https://images.unsplash.com/photo-1558981806-ec527fa84c39?q=80&w=600' },
            { id: 3, name: 'Aceite Motul 7100 10W40 1L', category: 'Líquidos', price: 460, stock: 24, img: 'https://images.unsplash.com/photo-1635843104323-5e6f66304561?q=80&w=600' },
            { id: 4, name: 'Guantes Alpinestars SP-8 V3', category: 'Accesorios', price: 3200, stock: 3, img: 'https://images.unsplash.com/photo-1591195853828-11db59a44f6b?q=80&w=600' },
            { id: 5, name: 'Filtro Aire K&N Alto Flujo', category: 'Refacciones', price: 1450, stock: 8, img: 'https://images.unsplash.com/photo-1621360841013-c7683c659ec6?q=80&w=600' }
        ];

        const DEFAULT_LEADS = [
            { id: 101, name: 'Ricardo Sánchez', bike: 'Kawasaki Z900', service: 'Servicio Mayor', date: 'Hoy, 4:00 PM' },
            { id: 102, name: 'Elena Méndez', bike: 'Yamaha R3', service: 'Cambio de Aceite', date: 'Mañana, 10:00 AM' }
        ];

        function App() {
            const [view, setView] = useState('client'); 
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [password, setPassword] = useState('');
            const [msg, setMsg] = useState(null);
            
            const [inventory, setInventory] = useState(() => {
                const saved = localStorage.getItem('moto_boutique_inv_v2');
                return saved ? JSON.parse(saved) : DEFAULT_STOCK;
            });

            const [leads, setLeads] = useState(() => {
                const saved = localStorage.getItem('moto_boutique_leads_v2');
                return saved ? JSON.parse(saved) : DEFAULT_LEADS;
            });

            useEffect(() => {
                localStorage.setItem('moto_boutique_inv_v2', JSON.stringify(inventory));
                localStorage.setItem('moto_boutique_leads_v2', JSON.stringify(leads));
            }, [inventory, leads]);

            const notify = (text) => {
                setMsg(text);
                setTimeout(() => setMsg(null), 3000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === 'motoboutique') {
                    setIsAdmin(true);
                    setView('admin');
                    setShowLogin(false);
                    setPassword('');
                    notify("Sesión iniciada como Admin");
                } else {
                    notify("Contraseña incorrecta");
                }
            };

            const ClientView = () => (
                <div className="fade-in min-h-screen pb-20 bg-[#09090b]">
                    <nav className="glass sticky top-0 z-[60] p-4 lg:p-6 flex justify-between items-center px-4 lg:px-16 border-b border-white/5">
                        <div className="flex items-center gap-3">
                            <div className="bg-orange-500 p-2 rounded-xl shadow-lg shadow-orange-500/20">
                                <Icons.Bike className="text-black" />
                            </div>
                            <div className="mobile-hide">
                                <h1 className="text-xl lg:text-2xl font-black uppercase tracking-tighter font-oswald leading-none">Moto Boutique</h1>
                                <p className="text-[10px] font-bold text-orange-500 uppercase tracking-[0.2em] italic">Taller de Motos</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setShowLogin(true)} className="text-[10px] font-black uppercase tracking-widest text-zinc-500 hover:text-orange-500 transition-colors">Acceso Admin</button>
                            <button className="bg-orange-500 text-black px-4 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:orange-glow-strong transition-all">Agendar Cita</button>
                        </div>
                    </nav>

                    <header className="h-[60vh] lg:h-[75vh] flex items-center justify-center relative overflow-hidden">
                        <div className="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/40 to-transparent z-10"></div>
                        <img src="https://images.unsplash.com/photo-1558981403-c5f91dbbe9ad?q=80&w=1600" className="absolute inset-0 w-full h-full object-cover grayscale opacity-40" alt="Hero" />
                        <div className="relative z-20 text-center max-w-4xl px-6">
                            <span className="text-orange-500 text-[10px] lg:text-xs font-black uppercase tracking-[0.5em] mb-4 block">Especialistas en Alto Cilindraje</span>
                            <h2 className="text-4xl lg:text-9xl font-oswald italic uppercase leading-[0.9] mb-8 tracking-tighter">EL TALLER DE LAS <br/><span className="text-orange-500 font-black">LEYENDAS</span></h2>
                            <div className="flex flex-col md:flex-row gap-4 justify-center">
                                <button className="bg-orange-500 text-black px-8 lg:px-10 py-4 lg:py-5 rounded-2xl font-black uppercase text-[10px] lg:text-xs tracking-widest hover:orange-glow-strong transition-all">Ver Refacciones</button>
                                <button className="border-2 border-white/20 px-8 lg:px-10 py-4 lg:py-5 rounded-2xl font-black uppercase text-[10px] lg:text-xs tracking-widest hover:bg-white hover:text-black transition-all">Conocer el Taller</button>
                            </div>
                        </div>
                    </header>

                    <section className="py-16 lg:py-24 px-4 lg:px-16 max-w-7xl mx-auto">
                        <div className="flex justify-between items-end mb-12">
                            <div>
                                <h3 className="font-oswald text-3xl lg:text-4xl uppercase italic border-l-4 border-orange-500 pl-6">Stock <span className="text-orange-500">Boutique</span></h3>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-10">
                            {inventory.map(item => (
                                <div key={item.id} className="glass p-5 rounded-[2.5rem] hover:orange-glow transition-all duration-500 group border border-white/5">
                                    <div className="h-64 rounded-3xl overflow-hidden mb-6 bg-zinc-900 relative">
                                        <div className="absolute top-4 right-4 z-10 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border border-white/10">{item.category}</div>
                                        <img src={item.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt={item.name} />
                                    </div>
                                    <h4 className="font-black uppercase text-lg mb-2 px-2 italic tracking-tight leading-tight">{item.name}</h4>
                                    <div className="flex justify-between items-center px-2 mt-6">
                                        <div>
                                            <p className="text-zinc-500 text-[9px] font-bold uppercase tracking-widest mb-1">Precio</p>
                                            <span className="text-3xl font-black text-orange-500">${item.price.toLocaleString()}</span>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-zinc-500 text-[9px] font-bold uppercase tracking-widest mb-1">Disponible</p>
                                            <span className="text-sm font-black text-white px-3 py-1 bg-white/5 rounded-full">{item.stock} pz</span>
                                        </div>
                                    </div>
                                    <button className="w-full mt-6 bg-white/5 hover:bg-orange-500 hover:text-black py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all">Consultar Disponibilidad</button>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );

            const AdminView = () => {
                const [adminTab, setAdminTab] = useState('inventory');
                const totalStockValue = useMemo(() => inventory.reduce((acc, cur) => acc + (cur.price * cur.stock), 0), [inventory]);

                const handleDelete = (id) => {
                    setInventory(inventory.filter(p => p.id !== id));
                    notify("Producto eliminado");
                };

                const handleCompleteLead = (id) => {
                    setLeads(leads.filter(l => l.id !== id));
                    notify("Cita finalizada");
                };

                return (
                    <div className="flex flex-col lg:flex-row min-h-screen fade-in bg-[#0c0c0e]">
                        {/* Sidebar Desktop / Navbar Mobile */}
                        <aside className="w-full lg:w-72 glass border-b lg:border-r border-white/5 p-6 lg:p-8 flex flex-row lg:flex-col lg:fixed lg:h-full z-50 justify-between lg:justify-start">
                            <div className="flex items-center gap-3 lg:mb-16">
                                <div className="bg-orange-500 p-2 rounded-xl text-black">
                                    <Icons.Bike size={24} />
                                </div>
                                <h2 className="font-oswald text-xl uppercase italic tracking-tighter">Moto Admin</h2>
                            </div>
                            
                            <nav className="hidden lg:flex flex-col flex-1 space-y-2 mt-8">
                                <button onClick={() => setAdminTab('inventory')} className={`w-full flex items-center gap-4 p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${adminTab === 'inventory' ? 'bg-orange-500 text-black shadow-lg' : 'text-zinc-500 hover:text-white hover:bg-white/5'}`}>
                                    <Icons.Package /> Inventario
                                </button>
                                <button onClick={() => setAdminTab('leads')} className={`w-full flex items-center gap-4 p-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${adminTab === 'leads' ? 'bg-orange-500 text-black shadow-lg' : 'text-zinc-500 hover:text-white hover:bg-white/5'}`}>
                                    <Icons.Users /> Citas Taller
                                </button>
                            </nav>

                            <div className="flex lg:flex-col gap-4">
                                <button onClick={() => { setIsAdmin(false); setView('client'); }} className="lg:mt-auto p-4 flex items-center gap-4 text-zinc-500 hover:text-red-500 transition-colors text-[10px] font-black uppercase tracking-widest">
                                    <Icons.Logout /> <span className="mobile-hide">Cerrar Sesión</span>
                                </button>
                            </div>
                        </aside>

                        {/* Mobile Nav Tabs */}
                        <div className="lg:hidden flex border-b border-white/5 p-2 bg-[#0c0c0e]">
                            <button onClick={() => setAdminTab('inventory')} className={`flex-1 p-4 rounded-xl text-[10px] font-black uppercase tracking-widest text-center ${adminTab === 'inventory' ? 'bg-orange-500/10 text-orange-500' : 'text-zinc-500'}`}>Inventario</button>
                            <button onClick={() => setAdminTab('leads')} className={`flex-1 p-4 rounded-xl text-[10px] font-black uppercase tracking-widest text-center ${adminTab === 'leads' ? 'bg-orange-500/10 text-orange-500' : 'text-zinc-500'}`}>Citas</button>
                        </div>

                        {/* Main Content */}
                        <main className="flex-1 lg:ml-72 p-6 lg:p-12 min-h-screen">
                            <header className="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-6">
                                <div>
                                    <p className="text-orange-500 text-[10px] font-black uppercase tracking-[0.4em] mb-2">Panel Operativo</p>
                                    <h2 className="text-4xl lg:text-5xl font-oswald uppercase italic tracking-tighter">Sistema Elite</h2>
                                </div>
                                {adminTab === 'inventory' && (
                                    <button onClick={() => setShowAddModal(true)} className="w-full md:w-auto bg-orange-500 text-black px-8 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest btn-action flex items-center justify-center gap-3 shadow-lg shadow-orange-500/20">
                                        <Icons.Plus /> Agregar Producto
                                    </button>
                                )}
                            </header>

                            {/* Stats */}
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 lg:gap-8 mb-12">
                                <div className="glass p-8 rounded-[2.5rem] border border-white/5">
                                    <p className="text-zinc-500 text-[10px] font-black uppercase tracking-widest mb-2">Capital en Stock</p>
                                    <h4 className="text-3xl font-black italic text-orange-500">${(totalStockValue / 1000).toFixed(1)}k</h4>
                                </div>
                                <div className="glass p-8 rounded-[2.5rem] border border-white/5">
                                    <p className="text-zinc-500 text-[10px] font-black uppercase tracking-widest mb-2">Artículos Activos</p>
                                    <h4 className="text-3xl font-black italic">{inventory.length}</h4>
                                </div>
                                <div className="glass p-8 rounded-[2.5rem] border border-white/5">
                                    <p className="text-zinc-500 text-[10px] font-black uppercase tracking-widest mb-2">Citas del Taller</p>
                                    <h4 className="text-3xl font-black italic">{leads.length}</h4>
                                </div>
                            </div>

                            {/* Dynamic Content */}
                            {adminTab === 'inventory' ? (
                                <div className="glass rounded-[2.5rem] overflow-hidden border border-white/5">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-zinc-900/50 mobile-hide">
                                                <tr>
                                                    <th className="p-8 text-[10px] font-black uppercase tracking-widest text-zinc-500">Producto</th>
                                                    <th className="p-8 text-[10px] font-black uppercase tracking-widest text-zinc-500">Categoría</th>
                                                    <th className="p-8 text-[10px] font-black uppercase tracking-widest text-zinc-500">Stock</th>
                                                    <th className="p-8 text-[10px] font-black uppercase tracking-widest text-zinc-500 text-right">Acciones</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5">
                                                {inventory.map(item => (
                                                    <tr key={item.id} className="hover:bg-white/5 transition-colors group mobile-table-card">
                                                        <td className="p-4 lg:p-8">
                                                            <div className="flex items-center gap-4">
                                                                <img src={item.img} className="w-14 h-14 rounded-2xl object-cover border border-white/10" />
                                                                <div>
                                                                    <p className="font-black text-sm uppercase italic">{item.name}</p>
                                                                    <p className="text-[10px] text-zinc-500 font-bold tracking-widest">${item.price.toLocaleString()}</p>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="p-4 lg:p-8 mobile-hide">
                                                            <span className="text-[9px] font-black uppercase tracking-widest px-3 py-1 bg-zinc-800 rounded-full">{item.category}</span>
                                                        </td>
                                                        <td className="p-4 lg:p-8">
                                                            <div className="flex items-center gap-3">
                                                                <span className={`text-xs font-black ${item.stock < 5 ? 'text-red-500' : 'text-orange-500'}`}>{item.stock}</span>
                                                                <div className="w-24 lg:w-32 h-2 bg-zinc-800 rounded-full overflow-hidden">
                                                                    <div className={`h-full ${item.stock < 5 ? 'bg-red-500' : 'bg-orange-500'}`} style={{width: `${Math.min(item.stock * 10, 100)}%`}}></div>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="p-4 lg:p-8 text-right">
                                                            <button onClick={() => handleDelete(item.id)} className="p-4 text-zinc-600 hover:text-red-500 transition-colors bg-white/5 rounded-xl">
                                                                <Icons.Trash size={18} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8">
                                    {leads.map(lead => (
                                        <div key={lead.id} className="glass p-8 lg:p-10 rounded-[2.5rem] flex justify-between items-center group relative overflow-hidden border border-white/5">
                                            <div className="absolute top-0 left-0 w-2 h-full bg-orange-500"></div>
                                            <div>
                                                <h5 className="text-xl lg:text-2xl font-black uppercase italic mb-1">{lead.name}</h5>
                                                <p className="text-orange-500 text-[10px] font-black uppercase tracking-[0.2em] mb-4">{lead.bike} — {lead.service}</p>
                                                <div className="flex items-center gap-2 text-zinc-500">
                                                    <Icons.Dashboard size={12} />
                                                    <p className="text-[11px] font-bold uppercase tracking-widest">{lead.date}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => handleCompleteLead(lead.id)} className="bg-emerald-500 text-black p-5 rounded-2xl btn-action shadow-lg shadow-emerald-500/20">
                                                <Icons.Check size={24} />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </main>
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative">
                    {view === 'client' ? <ClientView /> : <AdminView />}

                    {/* Notification Toast */}
                    {msg && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-zinc-900 border border-orange-500/50 px-8 py-4 rounded-2xl shadow-2xl animate-bounce">
                            <p className="text-orange-500 text-[10px] font-black uppercase tracking-widest">{msg}</p>
                        </div>
                    )}

                    {/* MODAL LOGIN ADMIN */}
                    {showLogin && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-zinc-950/95 backdrop-blur-2xl" onClick={() => setShowLogin(false)}></div>
                            <form onSubmit={handleLogin} className="relative glass w-full max-w-sm p-8 lg:p-12 rounded-[3.5rem] text-center border border-orange-500/20">
                                <div className="bg-orange-500 w-16 h-16 rounded-[1.5rem] flex items-center justify-center mx-auto mb-8 shadow-xl shadow-orange-500/20">
                                    <Icons.Plus size={32} className="text-black rotate-45" />
                                </div>
                                <h3 className="font-oswald text-3xl lg:text-4xl uppercase italic mb-2 tracking-tighter">Acceso Admin</h3>
                                <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-10 italic">Ingresa la clave del sistema</p>
                                <input 
                                    type="password" autoFocus 
                                    className="w-full bg-[#18181b] border border-white/10 focus:border-orange-500 outline-none rounded-[1.5rem] p-6 text-center text-3xl font-black tracking-widest mb-8 transition-all"
                                    placeholder="••••" value={password} onChange={(e) => setPassword(e.target.value)}
                                />
                                <button type="submit" className="w-full bg-orange-500 text-black py-6 rounded-[1.5rem] font-black uppercase text-xs tracking-widest hover:orange-glow-strong transition-all">Desbloquear Panel</button>
                            </form>
                        </div>
                    )}

                    {/* MODAL ADD PRODUCT */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-zinc-950/90 backdrop-blur-xl" onClick={() => setShowAddModal(false)}></div>
                            <div className="relative glass w-full max-w-lg p-8 lg:p-12 rounded-[3.5rem] border border-orange-500/20 max-h-[90vh] overflow-y-auto">
                                <h3 className="font-oswald text-3xl lg:text-4xl uppercase italic mb-8">Nuevo <span className="text-orange-500">Producto</span></h3>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const f = e.target;
                                    const item = {
                                        id: Date.now(),
                                        name: f.name.value,
                                        category: f.category.value,
                                        price: parseFloat(f.price.value),
                                        stock: parseInt(f.stock.value),
                                        img: 'https://images.unsplash.com/photo-1599819811279-d5ad9cccf838?q=80&w=600'
                                    };
                                    setInventory([item, ...inventory]);
                                    setShowAddModal(false);
                                    notify("Producto guardado");
                                }} className="space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-zinc-500 tracking-widest ml-2">Nombre del Artículo</label>
                                        <input name="name" required className="w-full input-dark" placeholder="Ej. Casco Scorpion R1" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-zinc-500 tracking-widest ml-2">Precio ($)</label>
                                            <input name="price" type="number" required className="w-full input-dark" placeholder="0.00" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-zinc-500 tracking-widest ml-2">Stock Inicial</label>
                                            <input name="stock" type="number" required className="w-full input-dark" placeholder="0" />
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-zinc-500 tracking-widest ml-2">Categoría</label>
                                        <select name="category" className="w-full input-dark bg-[#18181b] appearance-none font-black uppercase text-[10px] tracking-widest">
                                            <option>Accesorios</option>
                                            <option>Refacciones</option>
                                            <option>Líquidos</option>
                                        </select>
                                    </div>
                                    <button type="submit" className="w-full bg-orange-500 text-black py-6 rounded-[1.5rem] font-black uppercase text-xs tracking-widest mt-4 hover:orange-glow-strong transition-all">Guardar en Base de Datos</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
